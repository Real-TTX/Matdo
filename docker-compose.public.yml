# Matdo – einfachster Stack für Homelab/Public: deine App + offizielles Postgres.
# Start:  docker compose -f docker-compose.public.yml up -d
# Dann:   http://<host>:6006   (beim ersten Start: Admin anlegen)
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: matdo
      POSTGRES_PASSWORD: matdo
      POSTGRES_DB: matdo
    volumes:
      - db:/var/lib/postgresql/data

  matdo:
    image: ghcr.io/real-ttx/matdo:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "6006:6006"
    volumes:
      - data:/data

volumes:
  db:
  data:
