name: Publish image to GHCR

# Baut & veröffentlicht das App-Image für docker-compose.public.yml:
#   ghcr.io/real-ttx/matdo   (App; die Datenbank ist das offizielle postgres-Image)
#
# Nutzt das eingebaute GITHUB_TOKEN – keine Secrets nötig.
# Hinweis: Das Package nach dem ersten Lauf einmalig auf "Public" stellen
# (GitHub -> Packages -> matdo -> Package settings -> Change visibility),
# damit `docker compose up` es ohne Login ziehen kann.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            MATDO_VERSION=${{ github.ref_name }}
          tags: ghcr.io/real-ttx/matdo:latest
